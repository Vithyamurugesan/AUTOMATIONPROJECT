# Configuration name
name = PropertiesConfig

# Log file output folder
property.filename = D:\\Automation-Project\\logs

# Define appenders
appenders = console, file

# ===============================
# Console Appender (Colored Logs)
# ===============================
appender.console.type = Console
appender.console.name = STDOUT
appender.console.target = SYSTEM_OUT

appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %highlight{[%-5level]}{ERROR=red, WARN=yellow, INFO=blue, DEBUG=green} %d{HH:mm:ss.SSS} [%t] [%c{1}] [%M:%L] - %msg%n

# ===============================
# File Appender (Plain Logs)
# ===============================
appender.file.type = File
appender.file.name = LOGFILE
appender.file.fileName = ${filename}/logs.log
appender.file.append = true

appender.file.layout.type = PatternLayout
appender.file.layout.pattern = [%-5level] %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %c{1} - %msg%n

# ===============================
# Root Logger Configuration
# ===============================
rootLogger.level = debug
rootLogger.appenderRefs = stdout, file
rootLogger.appenderRef.stdout.ref = STDOUT
rootLogger.appenderRef.file.ref = LOGFILE